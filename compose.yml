# -----------------------------------------------
# NIA Monitoring — server stack (Cherry)
# -----------------------------------------------
name: monitoring-nia

# -----------------------------------------------
# Networks
# -----------------------------------------------
networks:
  frontend:
  backend:

# -----------------------------------------------
# Volumes
# -----------------------------------------------
volumes:
  NSD_prometheus_data:
  NSD_grafana_data:

# -----------------------------------------------
# Shared service defaults
# -----------------------------------------------
x-restart: &restart_policy
  restart: unless-stopped

# -----------------------------------------------
# Services
# -----------------------------------------------
services:
  # ----------------- Prometheus ------------------
  prometheus:
    <<: *restart_policy
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.13.1}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - NSD_prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - backend

  # ------------------ Grafana --------------------
  grafana:
    <<: *restart_policy
    image: grafana/grafana:${GRAFANA_VERSION:-13.0}
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${GRAFANA_HOST:-localhost}:${GRAFANA_PORT:-3000}
    volumes:
      - NSD_grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - backend
      - frontend

  # --------------- node_exporter -----------------
  # pid:host + rootfs bind for real host CPU/mem/disk. Stays on the Compose
  # backend network (not network_mode:host) so Prometheus can scrape via DNS —
  # Docker hairpin to host.docker.internal:9100 fails on this host's iptables.
  node_exporter:
    <<: *restart_policy
    image: quay.io/prometheus/node-exporter:${NODE_EXPORTER_VERSION:-v1.12.0}
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - backend

  # ----------------- cloudflared -----------------
  cloudflared:
    <<: *restart_policy
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION:-2026.7.1}
    profiles:
      - tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    networks:
      - frontend
