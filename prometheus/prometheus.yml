global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: cherry

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node
    static_configs:
      - targets:
          - node_exporter:9100
        labels:
          instance: cherry

  # Remote node_exporter via Tailscale MagicDNS
  - job_name: node_remote
    scheme: http
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/node_remote.yml
        refresh_interval: 30s

  # Remote blackbox_exporter self-metrics via Tailscale
  - job_name: blackbox
    scheme: http
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox.yml
        refresh_interval: 30s

  # ICMP probe through each slice's blackbox (Tailscale)
  - job_name: probe_icmp
    scheme: http
    metrics_path: /probe
    params:
      module:
        - icmp
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/probe_icmp.yml
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: probe_target
      - source_labels: [blackbox_host]
        target_label: __address__
      - regex: blackbox_host
        action: labeldrop

  # Speedtest Tracker (local Cherry)
  - job_name: speedtest
    scrape_interval: 60s
    scrape_timeout: 10s
    metrics_path: /prometheus
    static_configs:
      - targets:
          - speedtest-tracker:80
        labels:
          instance: cherry

  # Speedtest Tracker on slices (Tailscale)
  - job_name: speedtest_remote
    scrape_interval: 60s
    scrape_timeout: 10s
    scheme: http
    metrics_path: /prometheus
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/speedtest.yml
        refresh_interval: 30s

