# Global tags can be specified here in key="value" format.
[global_tags]
  # dc = "us-east-1" # will tag all metrics with dc=us-east-1
  # rack = "1a"
  ## Environment variables can be used as tags, and throughout the config file
  # user = "$USER"

###############################################################################
#                            AGENT CONFIG                                     #
###############################################################################

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "1s"
  flush_interval = "10s"
  flush_jitter = "1s"
  precision = ""
  debug = false
  quiet = false
  logfile = ""
  hostname = ""
  omit_hostname = true

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb_v2]]
  urls = ["http://influxdb2:8086"]
  token = "${INFLUXDB_ADMIN_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
  # exclude_bucket_tag = false
  timeout = "5s"
  # influx_uint_support = false
  # influx_omit_timestamp = false
  # ping_timeout = "0s"
  # read_idle_timeout = "0s"

  # concurrent_writes = 1

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

########################## Network Health Checks ###############################
[[inputs.ping]]
  name_override = "PingChecks"
  urls = [
    "vimeo.com",
    "youtube.com",
    "1.1.1.1",
    "8.8.8.8",
    "172.16.63.22",
    "194.72.6.57",
    "194.73.82.242"
    ]
  method = "native"
  count = 4
  ping_interval = "1s"
  timeout = "1s"
  deadline = "15s"
  interface = ""
  binary = "ping"
  ipv4 = true
  # size = "56B"

[[inputs.net]]
  interfaces = ["eth*", "enp0s[0-1]", "lo"]
  name_override = "NetworkInterfaces"

[[inputs.netstat]]
  name_override = "NetworkStats"

# Collect response time of a TCP or UDP connection
[[inputs.net_response]]
  protocol = "tcp"
  address = "vimeo.com:443"
  name_override = "VimeoResponse"

# Query given DNS server and gives statistics
[[inputs.dns_query]]
  servers = [
    "194.72.6.57",
    "194.73.82.242"
  ]
  network = "tcp"
  domains = ["vimeo.com"]
  timeout = "2s"
  name_override = "VimeoDNSQuery"

[[inputs.http]]
  urls = [
    "http://speedtest-tracker:80/api/v1/results/latest"
  ]
  name_override = "SpeedTest"
  method = "GET"
  headers = {"Accept" = "application/json"}
  token = "${SPEEDTEST_API_ACCESS_TOKEN}"
  data_format = "json_v2"
  [[inputs.http.json_v2]]
    measurement_name = "SpeedTest"
    [[inputs.http.json_v2.field]]
      path = "data.ping"
      type = "float"
    [[inputs.http.json_v2.field]]
      path = "data.download"
      type = "float"
    [[inputs.http.json_v2.field]]
      path = "data.upload"
      type = "float"
    [[inputs.http.json_v2.field]]
      path = "data.data.packetLoss"
      type = "float"
      rename = "packetLoss"
      optional = true
    [[inputs.http.json_v2.field]]
      path = "data.data.isp"
      type = "string"
      rename = "isp"
      optional = true
    [[inputs.http.json_v2.field]]
      path = "data.data.server.name"
      type = "string"
      rename = "server_name"
      optional = true

###############################################################################
#                            PROCESSORS                                       #
###############################################################################

[[processors.rename]]
  namepass = ["WP*"]
  [[processors.rename.replace]]
    field = "bitrate"
    dest = "videoBitrate"
  [[processors.rename.replace]]
    field = "platform"
    dest = "name"

