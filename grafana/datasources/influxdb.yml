apiVersion: 1

datasources:
  - name: InfluxDB_v2
    uid: influxdb_v2
    type: influxdb
    access: proxy
    isDefault: true
    url: http://influxdb2:8086
    jsonData:
      version: Flux
      organization: nia
      defaultBucket: nia
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_ADMIN_TOKEN}
